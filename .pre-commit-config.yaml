exclude: '^(docs/conf.py|tests/testdata/.*)'

repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.6
  hooks:
    - id: ruff          # linter
      types_or: [ python, pyi, jupyter ]
      args: [--fix]
    - id: ruff-format   # formatter
      types_or: [ python, pyi, jupyter ]
