theme:  # pulled from optimistix
    name: material
    features:
        - navigation.sections  # Sections are included in the navigation on the left.
        - toc.integrate  # Table of contents is integrated on the left; does not appear separately on the right.
        - header.autohide  # header disappears as you scroll
    palette:
        # Light mode / dark mode
        # We deliberately don't automatically use `media` to check a user's preferences. We default to light mode as
        # (a) it looks more professional, and (b) is more obvious about the fact that it offers a (dark mode) toggle.
        - scheme: default
          primary: white
          accent: amber
          toggle:
             icon: material/weather-night
             name: Switch to dark mode
        - scheme: slate
          primary: black
          accent: amber
          toggle:
             icon: material/weather-sunny
             name: Switch to light mode
    icon:
        repo: fontawesome/brands/github               # GitHub logo in top right
        logo: "material/chart-bell-curve-cumulative"  # glmax logo in top left
    favicon: "_static/favicon.png"
    custom_dir: "docs/_overrides"  # Overriding part of the HTML


site_name: glmax
site_description: Grammar-first generalized linear modeling in JAX.
site_url: https://mancusolab.github.io/glmax

repo_url: https://github.com/mancusolab/glmax
repo_name: mancusolab/glmax
edit_uri: ""  # No edit button, as some of our pages are in /docs and some in /examples via symlink, so it's impossible for them all to be accurate

strict: true  # Don't allow warnings during the build process

extra_javascript:
    - _static/mathjax.js
    - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
    - _static/custom_css.css

markdown_extensions:
    - pymdownx.arithmatex:      # Render LaTeX via MathJax
        generic: true
    - pymdownx.superfences      # Seems to enable syntax highlighting when used with the Material theme.
    - pymdownx.details          # Allowing hidden expandable regions denoted by ???
    - pymdownx.snippets:        # Include one Markdown file into another
        base_path: docs
    - admonition
    - toc:
        permalink: "¤"  # Adds a clickable permalink to each section heading
        toc_depth: 4

plugins:
    - search    # default search plugin; needs manually re-enabling when using any other plugins
    - autorefs  # Cross-links to headings
    - include_exclude_files:
        exclude:
            - "_overrides"
    - hippogriffe:
        show_bases: true
        extra_public_objects:
          - numpy.ndarray
          - lineax.AbstractLinearOperator
          - lineax.AbstractLinearSolver
          - jax.Array
          - jax.typing.ArrayLike
    - mkdocstrings:
        custom_templates: docs/_templates
        handlers:
            python:
                paths: [src]
                load_external_modules: true
                options:
                  # general
                  force_inspection: true
                  show_source: false
                  # headings
                  heading_level: 4
                  show_root_heading: true
                  show_symbol_type_heading: true
                  show_symbol_type_toc: true
                  # members
                  filters: [ "!^_", "^__init__$" ]
                  inherited_members: true
                  members_order: source
                  # docstrings
                  docstring_style: google
                  show_if_no_docstring: true
                  # signatures
                  line_length: 80
                  modernize_annotations: true
                  show_overloads: false
                  show_signature_annotations: true
                  separate_signature: false

nav:
    - Home: 'index.md'
    - Getting Started: 'guide.md'
    - JAX Transformations: 'jax-transformations.md'
    - From statsmodels: 'from-statsmodels.md'
    - API:
          - 'Families & Links': 'api/families-and-links.md'
          - 'fit':
              - 'Overview': 'api/fit/index.md'
              - 'Strategies & Solvers': 'api/fit/strategies.md'
          - 'infer':
              - 'Overview': 'api/infer/index.md'
              - 'Strategies & Standard Errors': 'api/infer/strategies.md'
          - 'check': 'api/check.md'
          - 'predict': 'api/predict.md'
    - Misc:
        - 'authors.md'
        - 'license.md'
        - 'conduct.md'
